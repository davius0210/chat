<!doctype html>
<html lang="id">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ghost Shadow AI</title>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #5f62d6;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }

    #game {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    canvas {
      display: block;
      margin: 0 auto;
    }

    /* ===== Top control bar ===== */
    .topbar {
      position: absolute;
      left: 50%;
      top: 12px;
      transform: translateX(-50%);
      width: min(1200px, 92vw);
      background: rgba(255, 255, 255, .92);
      border: 1px solid rgba(0, 0, 0, .10);
      border-radius: 16px;
      box-shadow: 0 10px 26px rgba(0, 0, 0, .12);
      padding: 10px 12px;
      display: flex;
      gap: 10px;
      align-items: center;
      z-index: 50;
      backdrop-filter: blur(10px);
    }

    .topbar .group {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .topbar label {
      font-size: 12px;
      color: rgba(42, 47, 58, .75);
      font-weight: 600;
    }

    .topbar select,
    .topbar input {
      height: 34px;
      border-radius: 10px;
      border: 1px solid rgba(0, 0, 0, .12);
      padding: 0 10px;
      background: #fff;
      font-size: 13px;
      outline: none;
    }

    .topbar input {
      width: 220px;
    }

    .topbar button {
      height: 34px;
      border: none;
      border-radius: 10px;
      padding: 0 10px;
      cursor: pointer;
      background: #667eea;
      color: #fff;
      font-weight: 700;
    }

    .topbar button.secondary {
      background: #eef1ff;
      color: #3b5bdb;
    }

    .badge {
      margin-left: auto;
      display: flex;
      gap: 10px;
      align-items: center;
      font-size: 12px;
      color: rgba(42, 47, 58, .75);
      white-space: nowrap;
    }

    .badge span {
      background: rgba(102, 126, 234, .12);
      color: #3b5bdb;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(102, 126, 234, .18);
      font-weight: 700;
    }

    /* ===== Chat overlay ===== */
    .chat-ui {
      position: absolute;
      left: 6%;
      width: 88%;
      top: 58%;
      height: 40%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 40;
      pointer-events: auto;
      transition:
        left .35s cubic-bezier(.4, 0, .2, 1),
        top .35s cubic-bezier(.4, 0, .2, 1),
        width .35s cubic-bezier(.4, 0, .2, 1),
        height .35s cubic-bezier(.4, 0, .2, 1),
        transform .25s ease,
        opacity .25s ease;
    }

    .chat-panel {
      flex: 1;
      background: rgba(255, 255, 255, 1);
      border: 1px solid rgba(0, 0, 0, .10);
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .12);
      padding: 14px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .chat-row.user {
      justify-content: flex-end;
    }

    .chat-row.ai {
      justify-content: flex-start;
    }

    .bubble {
      max-width: 72%;
      border-radius: 14px;
      padding: 10px 12px;
      border: 1px solid rgba(0, 0, 0, .10);
      box-shadow: 0 6px 14px rgba(0, 0, 0, .06);
      white-space: pre-wrap;
      word-wrap: break-word;
      position: relative;
    }

    .bubble.user {
      background: #667eea;
      color: #fff;
      border-color: rgba(0, 0, 0, .06);
    }

    .bubble.ai {
      background: #fff;
      color: #1b1f24;
    }

    /* area konten AI (markdown) */
    .bubble.ai .md * {
      margin: 0 0 8px;
    }

    .bubble.ai .md pre {
      background: #111827;
      color: #e5e7eb;
      padding: 10px;
      border-radius: 12px;
      overflow: auto;
    }

    .bubble.ai .md code {
      border-radius: 6px;
      padding: 2px 6px;
    }

    .copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      border: none;
      border-radius: 10px;
      padding: 6px 8px;
      background: #f4f6ff;
      color: #3b5bdb;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .copy-btn:hover {
      background: #e9edff;
    }

    .typing {
      opacity: .75;
      font-style: italic
    }

    /* Input */
    .input-bar {
      background: rgba(255, 255, 255, .92);
      border: 1px solid rgba(0, 0, 0, .10);
      border-radius: 18px;
      box-shadow: 0 10px 26px rgba(0, 0, 0, .10);
      padding: 12px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      resize: none;
      min-height: 44px;
      max-height: 140px;
      border-radius: 14px;
      border: 1px solid rgba(0, 0, 0, .10);
      background: #f7f8fc;
      padding: 10px 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 14px;
      line-height: 1.35;
      outline: none;
    }

    .send {
      width: 54px;
      height: 54px;
      border: none;
      border-radius: 50%;
      background: #667eea;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(0, 0, 0, .14);
      font-size: 18px;
      transition: transform .12s ease;
    }

    .send:active {
      transform: scale(.96);
    }

    .toast {
      position: absolute;
      left: 50%;
      top: 56%;
      transform: translate(-50%, -100%);
      background: rgba(0, 0, 0, .65);
      color: #fff;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity .18s ease, transform .18s ease;
      z-index: 60;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, -120%);
    }

    @media (max-width:768px) {
      .chat-ui {
        left: 4%;
        width: 92%;
        top: 56%;
        height: 42%;
        transition:
          left .35s cubic-bezier(.4, 0, .2, 1),
          top .35s cubic-bezier(.4, 0, .2, 1),
          width .35s cubic-bezier(.4, 0, .2, 1),
          height .35s cubic-bezier(.4, 0, .2, 1),
          transform .25s ease,
          opacity .25s ease;
      }

      .bubble {
        max-width: 86%;
      }

      .topbar {
        top: 8px;
      }

      .topbar input {
        width: 160px;
      }
    }

    /* tombol di topbar jadi konsisten */
    .topbar button {
      height: 34px;
      border: none;
      border-radius: 999px;
      /* pill */
      padding: 0 14px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: transform .12s ease, box-shadow .12s ease, background .12s ease, color .12s ease;
      box-shadow: 0 8px 18px rgba(0, 0, 0, .10);
    }

    .topbar button:active {
      transform: scale(.98);
    }

    /* clear */
    .topbar button.secondary {
      background: #eef1ff;
      color: #3b5bdb;
    }

    .topbar button.secondary:hover {
      background: #e5e9ff;
    }

    /* expand */
    .topbar button.toggle {
      background: linear-gradient(135deg, #111827, #374151);
      color: #fff;
    }

    .topbar button.toggle:hover {
      box-shadow: 0 12px 22px rgba(0, 0, 0, .16);
      transform: translateY(-1px);
    }

    /* state saat expanded */
    .topbar button.toggle.is-on {
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .chat-ui.expanded {
      left: 2% !important;
      width: 96% !important;
      top: 84px !important;
      /* biar ga nutup topbar */
      height: calc(100% - 110px) !important;
    }

    .chat-ui.expanded .chat-panel {
      /* panel memenuhi area expanded */
      flex: 1;
      border-radius: 18px;
    }

    /* ===== AI MESSAGE CODE FIX ===== */

    /* inline code */
    .assistant-message code {
      background: #f1f3f5;
      color: #1b1f24;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.9em;
    }

    /* code block */
    .assistant-message pre {
      background: #0f172a;
      /* dark navy (nyaman mata) */
      color: #e5e7eb;
      /* abu terang */
      padding: 14px 16px;
      border-radius: 12px;
      overflow-x: auto;
      margin: 10px 0;
      line-height: 1.45;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 14px;
    }

    /* code text */
    .assistant-message pre code {
      background: transparent !important;
      color: inherit !important;
      padding: 0;
      font-size: inherit;
      white-space: pre;
    }

    /* scrollbar code block */
    .assistant-message pre::-webkit-scrollbar {
      height: 8px;
    }

    .assistant-message pre::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.25);
      border-radius: 4px;
    }

    /* ===== COPY BUTTON DI CODE BLOCK ===== */

    .assistant-message pre {
      position: relative;
      /* anchor tombol */
    }

    /* tombol copy */
    .assistant-message .code-copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: #e5e7eb;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: 0;
      transition: opacity .15s ease, background .15s ease;
    }

    .assistant-message pre:hover .code-copy-btn {
      opacity: 1;
    }

    .assistant-message .code-copy-btn:hover {
      background: rgba(255, 255, 255, 0.18);
    }

    .assistant-message .code-copy-btn.copied {
      background: #22c55e;
      color: #022c22;
      border-color: transparent;
    }

    /* tombol copy di code block AI */
    .bubble.ai pre {
      position: relative;
    }

    .bubble.ai .code-copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: #e5e7eb;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: 0;
      transition: opacity .15s ease, background .15s ease;
    }

    .bubble.ai pre:hover .code-copy-btn {
      opacity: 1;
    }

    .bubble.ai .code-copy-btn:hover {
      background: rgba(255, 255, 255, 0.18);
    }

    .bubble.ai .code-copy-btn.copied {
      background: #22c55e;
      color: #022c22;
      border-color: transparent;
    }
  </style>
</head>

<body>
  <div id="game">

    <!-- Top controls -->
    <div class="topbar">
      <div class="group">
        <label>Provider</label>
        <select id="provider">
          <option>Loading...</option>
        </select>
      </div>
      <div class="group">
        <label>Model</label>
        <select id="modelSelect">
          <option>Loading...</option>
        </select>
      </div>
      <div class="group">
        <label>API Key</label>
        <input id="apiKey" type="password" placeholder="(Optional) API key" />
      </div>
      <button id="clearChat" class="secondary">Clear</button>
      <button id="toggleExpand" class="toggle" type="button">
        <span class="icon">⤢</span>
        <span class="label">Expand</span>
      </button>
      <div class="badge">
        <div>Model: <span id="modelName">-</span></div>
        <div><span id="messageCount">Messages: 0</span></div>
      </div>
    </div>

    <!-- DOM chat overlay -->
    <div class="chat-ui" id="chatUI">

      <div class="chat-panel" id="chatPanel"></div>

      <div class="input-bar">
        <textarea id="input" placeholder="Ketik pesan… (Enter kirim, Shift+Enter baris baru)"></textarea>
        <button id="submit" class="send" title="Kirim">➤</button>
      </div>
    </div>

    <div class="toast" id="toast">Copied!</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

  <script>
    // ===== Phaser scene: The Sims-style animated characters =====
    class MainScene extends Phaser.Scene {
      constructor() { super("main"); }

      preload() {
        // Load assets
        this.load.image("robot", "./assets/robot.png");
        this.load.image("human", "./assets/human.png");
        this.load.image("bg", "./assets/bg2.jpg");
        this.load.image("plumbob", "./assets/plumbob.png");

        // Load additional Sims-like assets
        this.load.image("thought", "./assets/thought-bubble.png");
        this.load.image("speech", "./assets/speech-bubble.png");
        this.load.spritesheet("robot-emote", "./assets/robot-emotes.png", { frameWidth: 64, frameHeight: 64 });
        this.load.spritesheet("human-emote", "./assets/human-emotes.png", { frameWidth: 64, frameHeight: 64 });
      }

      create() {
        const W = this.scale.width;
        const H = this.scale.height;

        // Background dengan parallax effect
        this.bg = this.add.image(W / 2, H / 2, "bg").setOrigin(0.5);
        const scaleX = W / this.bg.width;
        const scaleY = H / this.bg.height;
        const scale = Math.max(scaleX, scaleY);
        this.bg.setScale(scale).setDepth(-10);

        // Subtle background animation
        this.tweens.add({
          targets: this.bg,
          scaleX: scale * 1.002,
          scaleY: scale * 1.002,
          duration: 8000,
          yoyo: true,
          repeat: -1,
          ease: "Sine.easeInOut"
        });

        // UI labels dengan animasi
        const uiText = this.add.text(W * 0.25, 34, "🤖 AI Assistant", {
          fontFamily: "system-ui",
          fontSize: 16,
          color: "#2a2f3a",
          backgroundColor: "rgba(255,255,255,0.8)",
          padding: { x: 12, y: 6 },
          borderRadius: 8
        }).setOrigin(0.5).setDepth(100);

        const humanText = this.add.text(W * 0.75, 34, "👤 You", {
          fontFamily: "system-ui",
          fontSize: 16,
          color: "#2a2f3a",
          backgroundColor: "rgba(255,255,255,0.8)",
          padding: { x: 12, y: 6 },
          borderRadius: 8
        }).setOrigin(0.5).setDepth(100);

        // Character setup dengan lebih detail
        const floorY = H * 0.65;

        // Robot character setup
        this.robot = this.add.container(W * 0.25, floorY);
        const robotSprite = this.add.image(0, 0, "robot").setOrigin(0.5, 1);
        const fitRobot = (spr, targetH) => spr.setScale(targetH / spr.height);
        fitRobot(robotSprite, H * 0.35);

        // Robot shadow
        const robotShadow = this.add.graphics();
        robotShadow.fillStyle(0x000000, 0.15);
        robotShadow.fillEllipse(0, 5, robotSprite.width * 0.8, 8);
        robotShadow.setDepth(-1);

        this.robot.add([robotShadow, robotSprite]);
        this.robot.setDepth(10);

        // Human character setup
        this.human = this.add.container(W * 0.75, floorY);
        const humanSprite = this.add.image(0, 0, "human").setOrigin(0.5, 1);
        fitRobot(humanSprite, H * 0.35);

        // Human shadow
        const humanShadow = this.add.graphics();
        humanShadow.fillStyle(0x000000, 0.15);
        humanShadow.fillEllipse(0, 5, humanSprite.width * 0.8, 8);
        humanShadow.setDepth(-1);

        this.human.add([humanShadow, humanSprite]);
        this.human.setDepth(10);

        // Enhanced Plumbob untuk human
        this.pumblob = this.add.image(
          this.human.x,
          this.human.y - humanSprite.displayHeight * 0.9,
          "plumbob"
        ).setOrigin(0.5, 1).setScale(0.1).setDepth(20);

        // Robot status indicator
        this.robotStatus = this.add.circle(0, -humanSprite.displayHeight * 0.9, 8, 0x4ade80)
          .setOrigin(0.5, 1).setDepth(15);
        this.robotStatus.visible = false;

        // Animation states
        this.pumblobState = "idle";
        this.robotState = "idle";
        this.humanState = "idle";

        // Initialize animations
        this.initAnimations();
        this.setupEmotes();

        // Breathing animation untuk kedua karakter
        this.startBreathing();

        // Idle behaviors
        this.startIdleBehaviors();

        // Environmental effects
        this.createEnvironment();

        window.__mainScene = this;
      }

      initAnimations() {
        // Robot idle animations
        this.robotIdleTween1 = this.tweens.add({
          targets: this.robot,
          y: "-=8",
          duration: 2000,
          yoyo: true,
          repeat: -1,
          ease: "Sine.easeInOut",
          delay: 0,
          paused: true
        });

        this.robotIdleTween2 = this.tweens.add({
          targets: this.robot,
          rotation: 0.02,
          duration: 3000,
          yoyo: true,
          repeat: -1,
          ease: "Sine.easeInOut",
          delay: 1500,
          paused: true
        });

        // Human idle animations
        this.humanIdleTween1 = this.tweens.add({
          targets: this.human,
          y: "-=6",
          duration: 2500,
          yoyo: true,
          repeat: -1,
          ease: "Sine.easeInOut",
          delay: 500,
          paused: true
        });

        this.humanIdleTween2 = this.tweens.add({
          targets: this.human,
          rotation: -0.01,
          duration: 4000,
          yoyo: true,
          repeat: -1,
          ease: "Sine.easeInOut",
          delay: 2000,
          paused: true
        });
      }

      setupEmotes() {
        // Robot emote sprites
        this.robotEmote = this.add.image(0, -100, "robot-emote").setOrigin(0.5).setScale(0.8).setDepth(12);
        this.robotEmote.visible = false;
        this.robot.add(this.robotEmote);

        // Human emote sprites
        this.humanEmote = this.add.image(0, -100, "human-emote").setOrigin(0.5).setScale(0.8).setDepth(12);
        this.humanEmote.visible = false;
        this.human.add(this.humanEmote);
      }

      startBreathing() {
        // Subtle breathing effect
        this.tweens.add({
          targets: [this.robot, this.human],
          scaleY: 1.02,
          duration: 4000,
          yoyo: true,
          repeat: -1,
          ease: "Sine.easeInOut"
        });
      }

      startIdleBehaviors() {
        // Random head movements
        this.time.addEvent({
          delay: 3000,
          callback: () => {
            if (this.robotState === "idle") {
              this.robot.list[1].rotation = Phaser.Math.FloatBetween(-0.05, 0.05);
              this.time.delayedCall(500, () => {
                this.robot.list[1].rotation = 0;
              });
            }
          },
          loop: true
        });

        this.time.addEvent({
          delay: 4500,
          callback: () => {
            if (this.humanState === "idle") {
              this.human.list[1].rotation = Phaser.Math.FloatBetween(-0.03, 0.03);
              this.time.delayedCall(600, () => {
                this.human.list[1].rotation = 0;
              });
            }
          },
          loop: true
        });
      }

      createEnvironment() {
        // Improved environmental effects - subtle dust particles
        const dustParticles = this.add.particles(0, 0, null, {
          x: { min: 0, max: this.scale.width },
          y: { min: this.scale.height * 0.7, max: this.scale.height },
          lifespan: 3000,
          speed: { min: -15, max: 5 },
          scale: { start: 0.5, end: 0 },
          alpha: { start: 0.3, end: 0 },
          quantity: 1,
          frequency: 800,
          tint: 0xcccccc,
          blendMode: 'ADD'
        });
        dustParticles.setDepth(5);

        // Ambient light effect
        const light = this.add.graphics();
        light.fillGradientStyle(0xffffff, 0xffffff, 0x000000, 0x000000, 0.02, 0.01, 0, 0.005);
        light.fillRect(0, 0, this.scale.width, this.scale.height);
        light.setDepth(0);

        // Window light effect
        const windowLight = this.add.graphics();
        windowLight.fillStyle(0xffffcc, 0.05);
        windowLight.fillEllipse(this.scale.width * 0.1, this.scale.height * 0.2, 100, 80);
        windowLight.fillEllipse(this.scale.width * 0.9, this.scale.height * 0.15, 120, 90);
        windowLight.setDepth(1);
      }

      // Enhanced Plumbob states
      setPumblobState(state) {
        if (!this.pumblob) return;
        if (this.pumblobState === state) return;

        this.pumblobState = state;

        // Stop semua tween plumbob
        this.tweens.killTweensOf(this.pumblob);

        switch (state) {
          case "idle":
            this.pumblob.setTint(0x4ade80); // Hijau Sims
            this.pumblob.setScale(0.1);

            // Gentle floating
            this.tweens.add({
              targets: this.pumblob,
              y: '+=4',
              duration: 2000,
              yoyo: true,
              repeat: -1,
              ease: "Sine.easeInOut"
            });
            break;

          case "happy":
            this.pumblob.setTint(0xfbbf24); // Kuning bahagia
            this.pumblob.setScale(0.12);

            // Bounce effect
            this.tweens.chain({
              tweens: [
                {
                  targets: this.pumblob,
                  scale: 0.15,
                  y: '-=8',
                  duration: 200,
                  ease: "Bounce.easeOut"
                },
                {
                  targets: this.pumblob,
                  scale: 0.12,
                  y: '+=4',
                  duration: 150,
                  ease: "Sine.easeInOut"
                }
              ]
            });

            this.time.delayedCall(800, () => this.setPumblobState("idle"));
            break;

          case "typing":
            this.pumblob.setTint(0xfacc15); // Kuning typing
            this.pumblob.setScale(0.09);

            // Pulsing effect
            this.tweens.add({
              targets: this.pumblob,

              yoyo: true,

            });

              targets: this.pumblob,

              repeat: -1,

          case "sent":
            this.pumblob.setTint(0x60a5fa); // Biru terkirim

            // Wave effect
            this.tweens.add({
              targets: this.pumblob,
              x: '+=6',
              duration: 200,
              yoyo: true,
              repeat: 2,
              ease: "Sine.easeInOut"

            this.time.delayedCall(600, () => this.setPumblobState("happy"));
            break;

          case "error":
            this.pumblob.setTint(0xef4444); // Merah error
            this.pumblob.setScale(0.13);

              x: '+=4',

              yoyo: true,
              repeat: 4,
              ease: "Sine.easeInOut"
            });

            break;

          case "done":
            this.pumblob.setTint(0x22c55e); // Hijau selesai
            this.pumblob.setScale(0.14);

            // Success bounce
            this.tweens.chain({
              tweens: [
                {
                  targets: this.pumblob,
                  scale: 0.16,
                  y: '-=12',
                  duration: 300,
                  ease: "Bounce.easeOut"
                },
                {
                  targets: this.pumblob,
                  scale: 0.1,
                  y: '+=6',
                  duration: 400,
                  ease: "Sine.easeOut"
                }

      // Enhanced character states
      setCharacterState(who, state) {
        const target = who === "human" ? this.human : this.robot;
        if (!target) return;

        const sprite = target.list[1]; // Main sprite
        const emote = who === "human" ? this.humanEmote : this.robotEmote;

        // Stop all tweens for this character
        this.tweens.killTweensOf(target);
        this.tweens.killTweensOf(sprite);

        switch (state) {
          case "idle":
            if (who === "human") {
              this.humanState = "idle";
              this.humanIdleTween1.play();
              this.humanIdleTween2.play();
              emote.visible = false;
              this.pumblobState = "idle";
            } else {
              this.robotState = "idle";
              this.robotIdleTween1.play();
              this.robotIdleTween2.play();
              this.robotStatus.visible = false;
              emote.visible = false;
            }
            break;

          case "typing":
            if (who === "human") {
              this.humanState = "typing";
              this.tweens.add({
                targets: target,
                y: "-=10",
                duration: 200,
                ease: "Sine.easeOut"
              });
              this.humanIdleTween1.pause();
              this.humanIdleTween2.pause();
              emote.visible = true;
              emote.setTexture('human-emote', 0); // Typing frame
              this.setPumblobState("typing");
            }
            break;

          case "thinking":
            this.robotState = "thinking";
            this.robotIdleTween1.pause();
            this.robotIdleTween2.pause();
            this.robotStatus.visible = true;
            this.robotStatus.setFillStyle(0xa78bfa);

            // Thinking animation
            this.tweens.add({
              targets: target,
              y: "-=4",
              duration: 300,
              yoyo: true,
              repeat: -1,
              ease: "Sine.easeInOut"
            });

            emote.visible = true;
            emote.setTexture('robot-emote', 1); // Thinking frame
            this.setPumblobState("thinking");
            break;

          case "speaking":
            const speakState = who === "human" ? "sent" : "done";
            this.setPumblobState(speakState);

            if (who === "human") {
              this.humanState = "speaking";
              this.tweens.add({
                targets: target,
                y: "-=15",
                duration: 150,
                yoyo: true,
                repeat: 3,
                ease: "Sine.easeInOut"
              });
              emote.visible = true;
              emote.setTexture('human-emote', 2); // Speaking frame
            } else {
              this.robotState = "speaking";
              this.robotStatus.setFillStyle(0x22c55e);
              this.tweens.add({
                targets: target,
                scaleX: 1.05,
                scaleY: 0.98,
                duration: 200,
                yoyo: true,
                repeat: 4,
                ease: "Sine.easeInOut"
              });

            // Auto return to idle after speaking
            this.time.delayedCall(2000, () => {

      // FIXED: Improved Sims-style speech bubble dengan positioning yang benar
      showHeadBubble(who, text, type = "speech") {
        const target = who === "human" ? this.human : this.robot;
        if (!target) return;

        // Clean up existing bubbles
        if (this._headBubbles && this._headBubbles[who]) {
          this._headBubbles[who].destroy();
          this._headBubbles[who] = null;
        }

        if (!this._headBubbles) this._headBubbles = {};

        // Configuration untuk Sims-style bubble
        const maxWidth = 300;
        const paddingX = 18;
        const paddingY = 16;
        const fontSize = 15;

        // Sims-style colors
        const isHuman = who === "human";
        const bubbleColor = isHuman ? 0x5CC7F2 : 0x9FE870; // Biru untuk human, hijau untuk robot (khas Sims)
        const textColor = "#1a1a1a";
        const shadowColor = 0x000000;

        // Create text style
        const textStyle = {
          fontFamily: "'Comic Sans MS', 'Marker Felt', 'Chalkboard', cursive",
          fontSize: `${fontSize}px`,
          color: textColor,
          wordWrap: { width: maxWidth - (paddingX * 2), useAdvancedWrap: true },
          lineSpacing: 4,
          align: "left",
          fontStyle: "bold"
        };

        // Create temporary text untuk measure ukuran yang tepat
        const measureText = this.add.text(0, 0, text, textStyle);
        const textWidth = measureText.width;
        const textHeight = measureText.height;
        measureText.destroy();

        // Calculate bubble size berdasarkan text size
        const bubbleWidth = Math.min(maxWidth, Math.max(120, textWidth + (paddingX * 2)));
        const bubbleHeight = Math.max(60, textHeight + (paddingY * 2));

        // Create main text object dengan posisi center
        const bubbleText = this.add.text(
          bubbleWidth / 2,
          bubbleHeight / 2,
          text,
          textStyle
        ).setOrigin(0.5, 0.5);

        // Create graphics untuk bubble
        const bubbleGraphics = this.add.graphics();

        // Drop shadow untuk depth (Sims style)
        bubbleGraphics.fillStyle(shadowColor, 0.2);
        bubbleGraphics.fillRoundedRect(4, 4, bubbleWidth, bubbleHeight, 16);

        // Main bubble dengan gradient effect
        bubbleGraphics.fillStyle(bubbleColor, 1);
        bubbleGraphics.fillRoundedRect(0, 0, bubbleWidth, bubbleHeight, 16);

        // Inner highlight untuk glossy effect (khas Sims)
        bubbleGraphics.fillStyle(0xFFFFFF, 0.3);
        bubbleGraphics.fillRoundedRect(4, 4, bubbleWidth - 8, bubbleHeight / 2.5, 12);

        // Border untuk definition
        bubbleGraphics.lineStyle(3, 0xFFFFFF, 0.8);
        bubbleGraphics.strokeRoundedRect(0, 0, bubbleWidth, bubbleHeight, 16);

        // Tail/pointer dengan smooth transition (Sims style)
        const tailSize = 18;
        const tailX = isHuman ? bubbleWidth - 30 : 30;
        const tailY = bubbleHeight;

        // Tail shadow
        bubbleGraphics.fillStyle(shadowColor, 0.2);
        const tailPath = new Phaser.Geom.Polygon([
          tailX + 2, tailY + 2,
          tailX + tailSize + 2, tailY + 2,
          tailX + (tailSize / 2) + 2, tailY + tailSize + 2
        ]);
        bubbleGraphics.fillPoints(tailPath.points, true);

        // Main tail
        bubbleGraphics.fillStyle(bubbleColor, 1);
        const mainTailPath = new Phaser.Geom.Polygon([
          tailX, tailY,
          tailX + tailSize, tailY,
          tailX + (tailSize / 2), tailY + tailSize
        ]);
        bubbleGraphics.fillPoints(mainTailPath.points, true);

        // Tail border
        bubbleGraphics.lineStyle(3, 0xFFFFFF, 0.8);
        bubbleGraphics.strokePoints(mainTailPath.points, true);

        // Create container
        const bubbleContainer = this.add.container(0, 0).setDepth(25);
        bubbleContainer.add([bubbleGraphics, bubbleText]);

        // Position bubble di atas karakter
        const sprite = target.list[1];
        const headOffset = sprite.displayHeight * 1.15;

        bubbleContainer.setPosition(
          target.x - (bubbleWidth / 2),
          target.y - headOffset - bubbleHeight - tailSize
        );

        // Initial state untuk animation
        bubbleContainer.setAlpha(0);
        bubbleContainer.setScale(0.7);

        this._headBubbles[who] = bubbleContainer;

        // Entrance animation (Sims-style pop)
        this.tweens.add({
          targets: bubbleContainer,
          alpha: 1,
          scale: 1,
          duration: 250,
          ease: "Back.easeOut",
          easeParams: [1.7]
        });

        // Subtle floating animation while visible
        this.tweens.add({
          targets: bubbleContainer,
          y: bubbleContainer.y - 5,
          duration: 1500,
          yoyo: true,
          repeat: -1,
          ease: "Sine.easeInOut"
        });

        // Character reaction
        this.setCharacterState(who, "speaking");

        // Auto dismiss dengan timing yang tepat
        const displayTime = Math.max(3000, text.length * 50);
        this.time.delayedCall(displayTime, () => {
          if (!bubbleContainer.scene) return;

          this.tweens.add({
            targets: bubbleContainer,
            alpha: 0,
            scale: 0.7,
            duration: 200,
            ease: "Sine.easeIn",
            onComplete: () => {
              if (bubbleContainer.scene) {
                bubbleContainer.destroy();
                this._headBubbles[who] = null;
              }
            }
          });
        });
      }

      // Error notification
      showError(text) {
        this.showHeadBubble("robot", text, "error");
        this.setCharacterState("robot", "error");
      }

      // Success notification
      showSuccess(text) {
        this.setCharacterState("human", "happy");
        this.time.delayedCall(500, () => {

      update(time, delta) {

        // Update bubble positions smoothly

          }
        }

        // Subtle screen shake untuk liveliness
        if (Math.random() < 0.0005) {
          this.cameras.main.shake(100, 0.0015);
        }
      }
    }

    // Game initialization

  <script type="module">

    }];

    let messages = [...message_old];

    }

    // Auto-resize textarea
    function autoGrow() {
      input.style.height = "auto";

      window.__mainScene?.setPumblobState("typing");
    }
    input.addEventListener("input", autoGrow);

      messageCountEl.textContent = `Messages: ${userMessages}`;

      const opt = modelSelect.options[modelSelect.selectedIndex];
      modelNameEl.textContent = (opt && opt.value) ? opt.value : "-";

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function addBubble(role, content, { typing = false, markdown = false, enableCopy = false } = {}) {
      const row = document.createElement("div");
      row.className = "chat-row " + (role === "user" ? "user" : "ai");

      const bubble = document.createElement("div");

    try {

    async function loadModels() {
      modelSelect.innerHTML = `<option disabled selected>Loading...</option>`;
      try {
        const models = await client.models.list();
        modelSelect.innerHTML = "";
        models.forEach(model => {
          if (model.type && !["chat", "image", "text"].includes(model.type)) return;
          const opt = document.createElement("option");
          opt.value = model.id;

          let icon = "💬 ";
          if (model.type === "image") icon = "🎨 ";
          else if (model.type === "text") icon = "📝 ";

          opt.textContent = icon + model.id;
          if (model.type) opt.dataset.type = model.type;

          modelSelect.appendChild(opt);

          const imageUrl = response.data?.[0]?.url;

          messages.push({ role: "assistant", content: imageUrl ? `Image generated: ${imageUrl}` : "Gagal generate image." });
          window.__mainScene?.showHeadBubble("robot", imageUrl ? `Image generated: ${imageUrl}` : "Gagal generate image.");

        btn.type = "button";
        btn.innerHTML = "📋 <span>Copy</span>";

        btn.addEventListener("click", async () => {
          const code = pre.querySelector("code")?.innerText || "";
          if (!code) return;

          try {
            await navigator.clipboard.writeText(code);
            btn.classList.add("copied");
            btn.innerHTML = "✅ Copied";
            setTimeout(() => {
              btn.classList.remove("copied");
              btn.innerHTML = "📋 <span>Copy</span>";
            }, 1200);
          } catch (err) {
            btn.innerHTML = "❌ Failed";
            setTimeout(() => btn.innerHTML = "📋 <span>Copy</span>", 1200);
          }
        });

        pre.appendChild(btn);
      });
    }


  </script>
</body>

</html>
